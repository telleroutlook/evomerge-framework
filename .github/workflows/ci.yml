name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests + reproducer
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: PYTHONPATH=. pytest tests/ -q

      - name: Run self-test benchmark (synthetic ground truth)
        run: |
          python benchmarks/self_test.py
          # checks toolkit verdict matches analytical truth on
          # NO_SIGNAL and REAL_SIGNAL synthetic scenarios

      - name: Run reproducer (the case study)
        run: |
          python run_audit.py
          # exits 0 on success; CI fails if reproducer crashes

      - name: Regenerate paper figures from data/
        run: |
          pip install matplotlib
          python papers/eval_trust/scripts/make_figures.py
          # ensures figures are reproducible from data/ alone

      - name: Run all 10 eval_trust examples
        run: |
          for f in examples/recipe{1..10}*.py; do
            echo "--- $f ---"
            python "$f" || exit 1
          done

      - name: Run evomerge pipeline examples (recipe11–16)
        run: |
          for f in examples/recipe1{1..6}*.py; do
            echo "--- $f ---"
            python "$f" || exit 1
          done

      - name: Fixture hash check (golden fixtures must not drift)
        run: |
          python - <<'PY'
          import hashlib, json, sys
          lock = json.load(open("fixtures/fixtures.lock.json"))
          errors = []
          for e in lock["fixtures"]:
              try:
                  actual = hashlib.sha256(open(e["fixture"], "rb").read()).hexdigest()
                  if actual != e["sha256"]:
                      errors.append(f"DRIFT: {e['fixture']} expected={e['sha256'][:16]}... got={actual[:16]}...")
              except FileNotFoundError:
                  errors.append(f"MISSING: {e['fixture']}")
          if errors:
              for err in errors: print(err)
              sys.exit(1)
          print(f"✓ {len(lock['fixtures'])} fixture hashes verified")
          PY

      - name: Schema drift check (standalone, no wasmagent-js required)
        run: |
          python scripts/check-schema-fields.py
          # verifies evomerge/schemas/ covers all fields from data-loop contract

      - name: JSON Schema export check (schemas/ must be up to date)
        run: |
          python scripts/export-schemas.py --check
          # fails if schemas/*.schema.json differ from Pydantic model output

      - name: Schema parity check (runs.jsonl validates against both schemas)
        run: |
          python scripts/check-schema-parity.py \
            --runs-dir packages/compliance/benchmarks/ifeval || \
          echo "[skip] no benchmark data in CI environment — parity check skipped"

      - name: CLI smoke — export fixture
        run: |
          python -m evomerge export \
            --rollout fixtures/data-loop/rollout-branches.v1.jsonl \
            --out-dir /tmp/evomerge-smoke
          test -f /tmp/evomerge-smoke/manifest.json
          test -f /tmp/evomerge-smoke/sft.jsonl
          test -f /tmp/evomerge-smoke/dpo.jsonl
          test -f /tmp/evomerge-smoke/ppo.jsonl

      - name: CLI smoke — validate exported SFT
        run: |
          python -m evomerge validate \
            --input /tmp/evomerge-smoke/sft.jsonl \
            --strict

      - name: Lint
        run: |
          ruff check eval_trust/ evomerge/ tests/ run_audit.py \
            papers/eval_trust/scripts/ benchmarks/ examples/ scripts/

  paper:
    name: paper builds (pandoc + tectonic)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install matplotlib (needed for figure regen)
        run: pip install matplotlib

      - name: Regenerate figures (paper depends on them)
        run: python papers/eval_trust/scripts/make_figures.py

      - name: Install pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qqy pandoc

      - name: Install tectonic
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL \
              https://drop-sh.fullyjustified.net | sh
          sudo mv tectonic /usr/local/bin/

      - name: Build arxiv tar + sanity-compile PDF
        run: bash papers/eval_trust/scripts/prepare_arxiv.sh

      - name: Verify outputs exist
        run: |
          test -f papers/eval_trust/draft.pdf
          test -f papers/eval_trust/arxiv_upload.tar.gz
          ls -lah papers/eval_trust/draft.pdf papers/eval_trust/arxiv_upload.tar.gz

